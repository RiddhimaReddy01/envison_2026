services:
  - type: web
    name: envision-2026
    runtime: python
    plan: starter          # $7/mo — always-on, no cold starts; use "free" to test
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server --workers 1 --threads 8 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /
